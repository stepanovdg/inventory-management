# Serves the built Vue SPA. The browser calls the API directly at
# http://localhost:8001 (published by the backend container), so no proxy here.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA history-mode fallback: unknown paths return index.html so vue-router
    # can resolve client-side routes (e.g. /reports, /restocking).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache hashed static assets aggressively
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
